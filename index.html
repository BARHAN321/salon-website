<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHEIK FX — Mens Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F0E8;
    --warm-white: #FAF7F2;
    --beige: #E8DFD0;
    --sand: #C9B99A;
    --bronze: #8A6A3C;
    --gold: #B8943F;
    --gold-light: #D4AF6A;
    --charcoal: #1A1A18;
    --dark: #0F0F0D;
    --mid: #3A3830;
    --muted: #7A7568;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Jost', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; font-size: 16px; }

  body {
    background: var(--dark);
    color: var(--cream);
    font-family: var(--sans);
    font-weight: 300;
    overflow-x: hidden;
  }

  /* ── NAV ─────────────────────────────────────── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 24px 48px;
    background: transparent;
    transition: background .5s, backdrop-filter .5s, padding .3s;
  }
  nav.scrolled {
    background: rgba(10,10,8,.85);
    backdrop-filter: blur(18px);
    padding: 16px 48px;
    border-bottom: 1px solid rgba(184,148,63,.18);
  }
  .nav-logo {
    display: flex; flex-direction: column; gap: 1px;
    text-decoration: none;
  }
  .nav-logo-main {
    font-family: var(--serif); font-size: 22px; font-weight: 600;
    letter-spacing: 8px; color: var(--gold-light);
    line-height: 1;
  }
  .nav-logo-sub {
    font-size: 9px; letter-spacing: 6px; color: var(--sand);
    text-transform: uppercase; font-weight: 300;
  }
  .nav-links { display: flex; gap: 36px; list-style: none; }
  .nav-links a {
    text-decoration: none; color: var(--cream); font-size: 11px;
    letter-spacing: 3px; text-transform: uppercase; font-weight: 400;
    opacity: .8; transition: opacity .3s, color .3s;
  }
  .nav-links a:hover { opacity: 1; color: var(--gold-light); }
  .nav-book {
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold-light);
    padding: 10px 24px;
    font-family: var(--sans); font-size: 10px; letter-spacing: 3px;
    text-transform: uppercase; cursor: pointer;
    transition: background .3s, color .3s;
    font-weight: 400;
  }
  .nav-book:hover { background: var(--gold); color: var(--dark); }

  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
  .hamburger span { display: block; width: 24px; height: 1px; background: var(--cream); transition: .3s; }

  /* ── HERO ────────────────────────────────────── */
  .hero {
    position: relative; height: 100vh; min-height: 700px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .hero-slides { position: absolute; inset: 0; }
  .hero-slide {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    opacity: 0; transition: opacity 1.5s ease;
  }
  .hero-slide.active { opacity: 1; }
  .hero-slide::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(10,10,8,.7) 0%, rgba(10,10,8,.3) 50%, rgba(10,10,8,.6) 100%);
  }
  /* Gradient placeholder slides */
  .slide-1 { background: linear-gradient(135deg, #1a1209 0%, #2d1f0a 40%, #0f0f0d 100%); }
  .slide-2 { background: linear-gradient(135deg, #0d1a14 0%, #1a2d1f 40%, #0f0f0d 100%); }
  .slide-3 { background: linear-gradient(135deg, #1a0d14 0%, #2d1020 40%, #0f0f0d 100%); }

  /* Hero decorative lines */
  .hero-line-left {
    position: absolute; left: 48px; top: 50%; transform: translateY(-50%);
    width: 1px; height: 120px;
    background: linear-gradient(to bottom, transparent, var(--gold), transparent);
    z-index: 2;
  }
  .hero-line-right {
    position: absolute; right: 48px; top: 50%; transform: translateY(-50%);
    width: 1px; height: 120px;
    background: linear-gradient(to bottom, transparent, var(--gold), transparent);
    z-index: 2;
  }

  .hero-content {
    position: relative; z-index: 2;
    text-align: center; padding: 0 24px;
    animation: heroIn 1.6s cubic-bezier(.22,1,.36,1) both;
    animation-delay: .3s;
  }
  @keyframes heroIn {
    from { opacity:0; transform: translateY(40px); }
    to { opacity:1; transform: translateY(0); }
  }
  .hero-eyebrow {
    font-size: 10px; letter-spacing: 8px; text-transform: uppercase;
    color: var(--gold-light); font-weight: 400; margin-bottom: 20px;
    display: block;
  }
  .hero-title {
    font-family: var(--serif); font-size: clamp(56px, 9vw, 110px);
    font-weight: 300; line-height: .9;
    color: var(--warm-white); margin-bottom: 8px;
  }
  .hero-title em {
    font-style: italic; color: var(--gold-light);
    display: block; font-size: clamp(40px, 6vw, 76px);
  }
  .hero-subtitle {
    font-size: 12px; letter-spacing: 5px; text-transform: uppercase;
    color: var(--sand); margin: 28px 0 44px; font-weight: 300;
  }
  .hero-cta {
    display: inline-flex; align-items: center; gap: 16px;
    background: var(--gold);
    color: var(--dark); text-decoration: none;
    padding: 16px 44px;
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    font-family: var(--sans); font-weight: 500;
    transition: background .3s, transform .3s, box-shadow .3s;
    position: relative; overflow: hidden;
  }
  .hero-cta::before {
    content: ''; position: absolute; inset: 0;
    background: var(--bronze);
    transform: translateX(-100%); transition: transform .4s;
  }
  .hero-cta:hover::before { transform: translateX(0); }
  .hero-cta span { position: relative; z-index: 1; }
  .hero-cta:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(184,148,63,.35); }

  .hero-scroll {
    position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
    z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 8px;
    animation: float 2s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(6px)} }
  .hero-scroll span { font-size: 9px; letter-spacing: 4px; color: var(--sand); text-transform: uppercase; }
  .hero-scroll-line { width: 1px; height: 40px; background: linear-gradient(to bottom, var(--gold), transparent); }

  /* ── MARQUEE ─────────────────────────────────── */
  .marquee-strip {
    background: var(--gold); padding: 13px 0; overflow: hidden;
    border-top: 1px solid rgba(255,255,255,.1);
  }
  .marquee-track {
    display: flex; gap: 0; white-space: nowrap;
    animation: marquee 28s linear infinite;
  }
  @keyframes marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }
  .marquee-item {
    font-size: 10px; letter-spacing: 5px; text-transform: uppercase;
    color: var(--dark); font-weight: 500; padding: 0 32px;
    display: inline-flex; align-items: center; gap: 32px;
  }
  .marquee-dot { width: 4px; height: 4px; background: var(--bronze); border-radius: 50%; }

  /* ── SECTION COMMONS ─────────────────────────── */
  section { padding: 100px 0; }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 48px; }
  .section-label {
    font-size: 9px; letter-spacing: 6px; text-transform: uppercase;
    color: var(--gold); font-weight: 400; margin-bottom: 16px; display: block;
  }
  .section-title {
    font-family: var(--serif); font-size: clamp(36px, 5vw, 64px);
    font-weight: 300; line-height: 1.05; color: var(--warm-white);
    margin-bottom: 20px;
  }
  .section-title em { font-style: italic; color: var(--gold-light); }
  .section-desc {
    font-size: 14px; line-height: 1.8; color: var(--muted);
    max-width: 520px; font-weight: 300;
  }
  .gold-rule {
    width: 60px; height: 1px; background: var(--gold);
    margin: 28px 0;
  }

  /* ── ABOUT ───────────────────────────────────── */
  .about { background: var(--charcoal); }
  .about-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 80px; align-items: center;
  }
  .about-visual {
    position: relative; height: 520px;
  }
  .about-img-main {
    position: absolute; top: 0; left: 0; right: 40px; bottom: 40px;
    background: linear-gradient(135deg, #1e1812, #2d2318, #1a1510);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .about-img-main::before {
    content: '';
    position: absolute; inset: 0;
    background: 
      radial-gradient(ellipse at 30% 70%, rgba(184,148,63,.15) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 30%, rgba(138,106,60,.1) 0%, transparent 60%);
  }
  .about-img-accent {
    position: absolute; bottom: 0; right: 0; width: 180px; height: 220px;
    background: linear-gradient(135deg, #2d1f0a, #1a1209);
    border: 1px solid rgba(184,148,63,.2);
    display: flex; align-items: center; justify-content: center;
  }
  .about-placeholder-icon {
    font-size: 64px; opacity: .3;
    font-family: var(--serif); font-style: italic;
    color: var(--gold-light);
  }
  .about-stats {
    display: flex; gap: 40px; margin-top: 44px;
  }
  .about-stat { display: flex; flex-direction: column; }
  .stat-num {
    font-family: var(--serif); font-size: 48px; font-weight: 300;
    color: var(--gold-light); line-height: 1;
  }
  .stat-label {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted); margin-top: 4px; font-weight: 400;
  }
  .about-values { margin-top: 36px; display: flex; flex-direction: column; gap: 16px; }
  .about-value {
    display: flex; gap: 16px; align-items: flex-start;
    padding: 16px 20px;
    border-left: 1px solid rgba(184,148,63,.2);
    background: rgba(184,148,63,.03);
  }
  .value-icon { color: var(--gold); font-size: 18px; flex-shrink: 0; margin-top: 2px; }
  .value-text h4 { font-family: var(--serif); font-size: 18px; font-weight: 400; color: var(--cream); margin-bottom: 4px; }
  .value-text p { font-size: 13px; color: var(--muted); line-height: 1.6; }

  /* ── GALLERY ─────────────────────────────────── */
  .gallery { background: var(--dark); }
  .gallery-header {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 48px; flex-wrap: wrap; gap: 24px;
  }
  .filter-bar {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .filter-btn {
    background: transparent;
    border: 1px solid rgba(184,148,63,.25);
    color: var(--muted);
    padding: 8px 18px;
    font-family: var(--sans); font-size: 10px;
    letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
    transition: all .25s; font-weight: 400;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--gold); border-color: var(--gold);
    color: var(--dark);
  }

  .gallery-search {
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid rgba(184,148,63,.25);
    padding-bottom: 8px; margin-bottom: 40px;
  }
  .gallery-search input {
    background: transparent; border: none; outline: none;
    color: var(--cream); font-family: var(--sans); font-size: 13px;
    font-weight: 300; width: 240px; letter-spacing: 1px;
  }
  .gallery-search input::placeholder { color: var(--muted); }
  .search-icon { color: var(--gold); font-size: 14px; }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .gallery-item {
    position: relative; overflow: hidden; cursor: pointer;
    background: var(--charcoal);
    aspect-ratio: 3/4;
    transition: transform .4s cubic-bezier(.22,1,.36,1);
  }
  .gallery-item:nth-child(5n+3) { aspect-ratio: 3/3.5; }
  .gallery-item:nth-child(7n+1) { aspect-ratio: 3/4.5; }
  .gallery-item:hover { transform: translateY(-6px); }
  .gallery-item-bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    transition: transform .6s cubic-bezier(.22,1,.36,1);
  }
  .gallery-item:hover .gallery-item-bg { transform: scale(1.06); }
  .gallery-item-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(10,10,8,.92) 0%, rgba(10,10,8,.3) 50%, transparent 100%);
    opacity: 0; transition: opacity .4s;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 24px;
  }
  .gallery-item:hover .gallery-item-overlay { opacity: 1; }
  .item-cat {
    font-size: 9px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 6px;
  }
  .item-name {
    font-family: var(--serif); font-size: 20px; font-weight: 400;
    color: var(--warm-white); margin-bottom: 4px;
  }
  .item-stylist { font-size: 11px; color: var(--sand); letter-spacing: 1px; }
  .item-tag {
    position: absolute; top: 16px; left: 16px;
    background: rgba(10,10,8,.7);
    border: 1px solid rgba(184,148,63,.3);
    backdrop-filter: blur(8px);
    font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold-light); padding: 4px 10px;
  }
  /* Rich gradient patterns for each gallery item */
  .g-style-1 { background: linear-gradient(145deg,#1a1209,#2d2015,#0f0d09); }
  .g-style-2 { background: linear-gradient(145deg,#0d1218,#1218200,#080f14); }
  .g-style-3 { background: linear-gradient(145deg,#18130d,#2b1e12,#0f0c09); }
  .g-style-4 { background: linear-gradient(145deg,#0e1515,#152020,#0a1010); }
  .g-style-5 { background: linear-gradient(145deg,#16100d,#261912,#0f0b09); }
  .g-style-6 { background: linear-gradient(145deg,#110e18,#1c1728,#0c0b14); }
  .g-style-7 { background: linear-gradient(145deg,#1a150a,#2c2210,#110e07); }
  .g-style-8 { background: linear-gradient(145deg,#0a1210,#12201c,#070f0e); }

  /* Gallery color block patterns to simulate hair photos */
  .gallery-item-bg.g-1 { background: linear-gradient(160deg,#c8a97a 0%,#8b6234 30%,#3d2811 60%,#1a0f08 100%); }
  .gallery-item-bg.g-2 { background: linear-gradient(160deg,#e8e4dc 0%,#c5bfb8 30%,#7a736a 60%,#2a2720 100%); }
  .gallery-item-bg.g-3 { background: linear-gradient(160deg,#f4dfc8 0%,#d4a87a 30%,#8c5e35 60%,#1a0e08 100%); }
  .gallery-item-bg.g-4 { background: linear-gradient(160deg,#2c2c2c 0%,#1a1a1a 40%,#0d0d0d 100%); }
  .gallery-item-bg.g-5 { background: linear-gradient(160deg,#d4b896 0%,#a8855c 30%,#5c3d22 60%,#1a0f08 100%); }
  .gallery-item-bg.g-6 { background: linear-gradient(160deg,#e8d5c0 0%,#c0946a 30%,#703e20 60%,#1a0a06 100%); }
  .gallery-item-bg.g-7 { background: linear-gradient(160deg,#f0e8e0 0%,#d5c5b5 30%,#8a7a6a 60%,#1a1812 100%); }
  .gallery-item-bg.g-8 { background: linear-gradient(160deg,#3a1a08 0%,#5c2c12 30%,#8a4a22 60%,#c0783a 100%); }
  .gallery-item-bg.g-9 { background: linear-gradient(160deg,#e0d0c8 0%,#b0908a 30%,#704048 60%,#180a0c 100%); }
  .gallery-item-bg.g-10 { background: linear-gradient(160deg,#c8d8e0 0%,#7a9fb0 30%,#3a5868 60%,#0a1418 100%); }
  .gallery-item-bg.g-11 { background: linear-gradient(160deg,#f8f0dc 0%,#e8d898 30%,#c0a048 60%,#503800 100%); }
  .gallery-item-bg.g-12 { background: linear-gradient(160deg,#1a2820 0%,#284038 30%,#386048 60%,#507860 100%); }
  .gallery-item-bg.g-13 { background: linear-gradient(160deg,#181020 0%,#2c1840 30%,#482868 60%,#683888 100%); }
  .gallery-item-bg.g-14 { background: linear-gradient(160deg,#281008 0%,#481818 30%,#782828 60%,#a03838 100%); }
  .gallery-item-bg.g-15 { background: linear-gradient(160deg,#d8cdc0 0%,#a89080 30%,#786050 60%,#180e08 100%); }
  .gallery-item-bg.g-16 { background: linear-gradient(160deg,#e8e8e8 0%,#c0c0c0 30%,#707070 60%,#101010 100%); }
  /* Add organic shape overlays */
  .gallery-item-bg::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 40% 20%, rgba(255,255,255,.08) 0%, transparent 55%);
  }
  .gallery-item-bg::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 70% 80%, rgba(0,0,0,.3) 0%, transparent 50%);
  }

  /* Load more */
  .gallery-load-more {
    text-align: center; margin-top: 56px;
  }
  .btn-outline {
    display: inline-flex; align-items: center; gap: 12px;
    background: transparent;
    border: 1px solid rgba(184,148,63,.4);
    color: var(--gold-light);
    padding: 14px 40px;
    font-family: var(--sans); font-size: 10px;
    letter-spacing: 4px; text-transform: uppercase; cursor: pointer;
    transition: all .3s; font-weight: 400;
  }
  .btn-outline:hover {
    background: rgba(184,148,63,.1);
    border-color: var(--gold);
    box-shadow: 0 0 30px rgba(184,148,63,.1);
  }

  /* ── SERVICES ────────────────────────────────── */
  .services { background: var(--charcoal); }
  .services-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 2px; margin-top: 56px;
  }
  .service-card {
    background: rgba(255,255,255,.02);
    border: 1px solid rgba(184,148,63,.08);
    padding: 40px 32px;
    transition: background .3s, border-color .3s, transform .3s;
    position: relative; overflow: hidden;
  }
  .service-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    transform: scaleX(0); transition: transform .4s;
  }
  .service-card:hover { background: rgba(184,148,63,.05); border-color: rgba(184,148,63,.2); transform: translateY(-4px); }
  .service-card:hover::before { transform: scaleX(1); }
  .service-icon { font-size: 28px; margin-bottom: 20px; display: block; }
  .service-name {
    font-family: var(--serif); font-size: 22px; font-weight: 400;
    color: var(--cream); margin-bottom: 12px; line-height: 1.2;
  }
  .service-desc { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 24px; }
  .service-meta { display: flex; justify-content: space-between; align-items: center; }
  .service-price { font-family: var(--serif); font-size: 28px; color: var(--gold-light); }
  .service-price sup { font-size: 14px; vertical-align: super; }
  .service-duration { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }

  /* ── PROCESS ─────────────────────────────────── */
  .process { background: var(--dark); }
  .process-steps {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 40px; margin-top: 64px; position: relative;
  }
  .process-steps::before {
    content: '';
    position: absolute; top: 32px; left: 0; right: 0; height: 1px;
    background: linear-gradient(to right, transparent, rgba(184,148,63,.3), transparent);
  }
  .process-step { text-align: center; position: relative; }
  .step-num {
    width: 64px; height: 64px;
    border: 1px solid rgba(184,148,63,.3);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    font-family: var(--serif); font-size: 24px;
    color: var(--gold-light); background: var(--dark);
    position: relative; z-index: 1;
    transition: background .3s, border-color .3s;
  }
  .process-step:hover .step-num { background: var(--gold); color: var(--dark); border-color: var(--gold); }
  .step-title { font-family: var(--serif); font-size: 20px; color: var(--cream); margin-bottom: 12px; }
  .step-desc { font-size: 13px; color: var(--muted); line-height: 1.7; }

  /* ── BOOKING ─────────────────────────────────── */
  .booking {
    background: linear-gradient(135deg, var(--charcoal) 0%, #1a1208 100%);
    border-top: 1px solid rgba(184,148,63,.1);
    border-bottom: 1px solid rgba(184,148,63,.1);
  }
  .booking-inner {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 80px; align-items: start;
  }
  .booking-form { margin-top: 40px; }
  .form-group { margin-bottom: 24px; }
  .form-group label {
    display: block; font-size: 9px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--gold);
    margin-bottom: 8px; font-weight: 400;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(184,148,63,.2);
    color: var(--cream);
    padding: 14px 16px;
    font-family: var(--sans); font-size: 13px; font-weight: 300;
    outline: none;
    transition: border-color .3s, background .3s;
    appearance: none;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: var(--gold);
    background: rgba(184,148,63,.06);
  }
  .form-group select option { background: var(--charcoal); }
  .form-group textarea { resize: vertical; min-height: 100px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .btn-submit {
    width: 100%;
    background: var(--gold);
    border: none;

 <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDJQlAXFnMx5pYLc3X9QeoxpsfyyIc_Lnk",
      authDomain: "sheikfx-website.firebaseapp.com",
      projectId: "sheikfx-website",
      storageBucket: "sheikfx-website.firebasestorage.app",
      messagingSenderId: "771023238365",
      appId: "1:771023238365:web:8d853b10c6cb951a955734"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // FIX: Expose handleBooking to the HTML button click
    window.handleBooking = async function(e) {
      e.preventDefault();
      const btn = e.target;
      const form = btn.closest('.booking-form');

      const bookingData = {
        firstName: form.querySelector('input[placeholder="Arjun"]').value,
        lastName: form.querySelector('input[placeholder="Kumar"]').value,
        phone: form.querySelector('input[type="tel"]').value,
        email: form.querySelector('input[type="email"]').value,
        service: form.querySelector('select').value,
        date: form.querySelector('input[type="date"]').value,
        time: form.querySelectorAll('select')[1].value,
        notes: form.querySelector('textarea').value,
        createdAt: new Date()
      };

      if (!bookingData.firstName || !bookingData.phone || !bookingData.service) {
        btn.textContent = '✗ Please fill in required fields';
        btn.style.background = '#8a2323';
        return;
      }

      btn.textContent = 'Sending Reservation...';
      btn.disabled = true;

      try {
        // Authenticate anonymously first
        await signInAnonymously(auth);
        
        // FIX: Removed 'window.' prefix so it uses the direct Firebase imports above
        await addDoc(collection(db, "bookings"), bookingData);

        btn.textContent = '✓ Booking Confirmed!';
        btn.style.background = 'var(--bronze)';
        form.reset();
      } catch (error) {
        console.error("Error adding document: ", error);
        btn.textContent = '✗ Connection Error. Try Again.';
        btn.style.background = '#8a2323';
        btn.disabled = false;
      }

      setTimeout(() => {
        btn.textContent = 'Confirm My Booking →';
        btn.style.background = '';
        btn.disabled = false;
      }, 5000);
    };
  };

function renderGallery() {
  const grid = document.getElementById('galleryGrid');

    const matchCat = activeFilter === 'all' || item.cat === activeFilter;
    const matchSearch = item.name.toLowerCase().includes(searchTerm) || item.tag.toLowerCase().includes(searchTerm);
    return matchCat && matchSearch;
  });
  const toShow = filtered.slice(0, visibleCount);
  grid.innerHTML = toShow.map(item => `
    <div class="gallery-item reveal" onclick="openLightbox('${item.g}','${item.tag}','${item.name}','${item.stylist}')">
      <div class="gallery-item-bg" style="background-image: url('${item.g}')"></div>

        <div class="item-stylist">by ${item.stylist}</div>
      </div>
    </div>
  `).join('');

  setTimeout(() => {
    document.querySelectorAll('#galleryGrid .reveal').forEach(el => {

  }, 50);
}

});

function openLightbox(bg, cat, name, stylist) {
  const lb = document.getElementById('lightbox');
  document.getElementById('lightboxImg').style.backgroundImage = `url('${bg}')`;
  document.getElementById('lightboxCat').textContent = cat;
  document.getElementById('lightboxTitle').textContent = name;
  document.getElementById('lightboxStylist').textContent = 'by ' + stylist;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(e) {
  if (e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lightbox-close')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

// ── SCROLL REVEAL ─────────────────────────────────
const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach(el => {
    if (el.isIntersecting) { el.target.classList.add('visible'); }
  });
}, { threshold: 0.08 });

function observeReveals() {
  document.querySelectorAll('.reveal:not(.visible)').forEach(el => revealObserver.observe(el));
}

window.handleBooking = async function(e) {
  e.preventDefault();
  const btn = e.target;
  const form = btn.closest('.booking-form');

  const bookingData = {
    firstName: form.querySelector('input[placeholder="Arjun"]').value,
    lastName: form.querySelector('input[placeholder="Kumar"]').value,
    phone: form.querySelector('input[type="tel"]').value,
    email: form.querySelector('input[type="email"]').value,
    service: form.querySelector('select').value,
    date: form.querySelector('input[type="date"]').value,
    time: form.querySelectorAll('select')[1].value, // Second select element in the form
    notes: form.querySelector('textarea').value,
    createdAt: new Date()
  };

  // Validation check
  if (!bookingData.firstName || !bookingData.phone || !bookingData.service) {
    btn.textContent = '✗ Please fill in required fields';
    btn.style.background = '#8a2323'; // Dark red for error
    return;
  }

  btn.textContent = 'Sending Reservation...';
  btn.disabled = true;

  try {
        // Authenticate anonymously first
        await signInAnonymously(auth);
        
        // Save the booking data to Firestore
        await addDoc(collection(db, "bookings"), bookingData);

        btn.textContent = '✓ Booking Confirmed!';
        btn.style.background = 'var(--bronze)';
        form.reset();
      } catch (error) {
        console.error("Error adding document: ", error);
        btn.textContent = '✗ Connection Error. Try Again.';
        btn.style.background = '#8a2323';
        btn.disabled = false;
      }

      setTimeout(() => {
        btn.textContent = 'Confirm My Booking →';
        btn.style.background = '';
        btn.disabled = false;
      }, 5000);
    };
